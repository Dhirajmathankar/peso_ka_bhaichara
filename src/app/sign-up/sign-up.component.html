
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 md:p-8">
    <div class="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-xl border border-gray-100 w-full max-w-lg">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-teal-50 rounded-2xl mb-4">
                <i class="fas fa-user-plus text-teal-600 text-2xl"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-800">Create Account</h2>
            <p class="text-gray-400 text-sm mt-2 font-medium">Join us to start booking your rides</p>
        </div>

        <form action="/signup" method="POST" class="space-y-6">
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2 tracking-widest">Full Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="far fa-user text-sm"></i>
                        </span>
                        <input type="text" name="fullname" required placeholder="Dhiraj Mathankar" 
                            class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none transition-all placeholder:text-gray-300">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2 tracking-widest">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="far fa-envelope text-sm"></i>
                        </span>
                        <input type="email" name="email" required placeholder="name@example.com" 
                            class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none transition-all placeholder:text-gray-300">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2 tracking-widest">Phone Number</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="fas fa-phone-alt text-sm"></i>
                        </span>
                        <input type="tel" name="phone" required placeholder="98765 43210" 
                            class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none transition-all placeholder:text-gray-300">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2 tracking-widest">Create Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="fas fa-lock text-sm"></i>
                        </span>
                        <input type="password" name="password" required placeholder="••••••••" 
                            class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none transition-all placeholder:text-gray-300">
                    </div>
                </div>
            </div>

            <div class="flex items-start gap-3 px-1">
                <input type="checkbox" id="terms" required class="mt-1 accent-teal-600 h-4 w-4 rounded">
                <label for="terms" class="text-xs text-gray-500 leading-normal">
                    I agree to the <a href="#" class="text-teal-600 font-bold hover:underline">Terms of Service</a> and 
                    <a href="#" class="text-teal-600 font-bold hover:underline">Privacy Policy</a>.
                </label>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-teal-600 to-teal-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-teal-100 hover:shadow-teal-200 hover:-translate-y-0.5 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Create Account <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-50 text-center">
            <p class="text-sm text-gray-500">
                Already have an account? 
                <a href="/auth/login" class="text-teal-600 font-extrabold hover:underline ml-1">Log In</a>
            </p>
        </div>
    </div>
</body>
