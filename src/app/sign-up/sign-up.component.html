<div class="fixed inset-0 bg-gradient-to-br from-[#121212] via-[#1F1F1F] to-[#121212] overflow-y-auto flex items-center justify-center p-4 md:p-8 antialiased text-gray-100 selection:bg-emerald-500/30">
    
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_rgba(16,185,129,0.03),_transparent_60%)] pointer-events-none"></div>

    <div class="w-full max-w-md my-auto relative z-10 flex flex-col justify-center">
        
        <div class="text-center mb-6">
            <div class="w-14 h-14 bg-gradient-to-tr from-emerald-500 to-green-800 rounded-2xl mx-auto flex items-center justify-center border border-emerald-400/20 shadow-xl mb-3 transform transition-transform hover:scale-105 duration-300">
                <span class="material-icons text-white text-2xl">person_add</span>
            </div>
            <h2 class="text-2xl font-black tracking-tight text-white">Create Account</h2>
            <p class="text-[10px] text-emerald-400 font-bold mt-1 uppercase tracking-widest">Join Bhaichara Trackers</p>
        </div>

        <div class="bg-[#1A1A1A]/90 backdrop-blur-xl p-6 md:p-8 rounded-[2rem] border border-green-950/60 shadow-[0_30px_90px_rgba(0,0,0,0.6),inset_0px_-3px_8px_rgba(255,255,255,0.01)] space-y-4">
            
            <div>
                <label class="block text-[11px] text-gray-400 uppercase font-bold mb-1.5 tracking-wider">Email Address</label>
                <div class="relative">
                    <span class="material-icons absolute left-4 top-3.5 text-gray-500 text-base">email</span>
                    <input 
                        type="email" 
                        [(ngModel)]="email" 
                        name="email"
                        placeholder="name@example.com"
                        class="w-full bg-[#121212] border border-green-950 rounded-xl py-3 pl-11 pr-4 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-950/30 transition-all font-medium"
                    />
                </div>
            </div>

            <div>
                <label class="block text-[11px] text-gray-400 uppercase font-bold mb-1.5 tracking-wider">Phone Number</label>
                <div class="relative">
                    <span class="material-icons absolute left-4 top-3.5 text-gray-500 text-base">phone</span>
                    <input 
                        type="tel" 
                        [(ngModel)]="phone" 
                        name="phone"
                        placeholder="62611XXXXX"
                        class="w-full bg-[#121212] border border-green-950 rounded-xl py-3 pl-11 pr-4 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-950/30 transition-all font-medium"
                    />
                </div>
            </div>

            <div>
                <label class="block text-[11px] text-gray-400 uppercase font-bold mb-1.5 tracking-wider">Password</label>
                <div class="relative">
                    <span class="material-icons absolute left-4 top-3.5 text-gray-500 text-base">lock</span>
                    <input 
                        type="password" 
                        [(ngModel)]="password" 
                        name="password"
                        placeholder="••••••••"
                        class="w-full bg-[#121212] border border-green-950 rounded-xl py-3 pl-11 pr-4 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-950/30 transition-all font-medium"
                    />
                </div>
            </div>

            <div>
                <label class="block text-[11px] text-gray-400 uppercase font-bold mb-1.5 tracking-wider">Active Trip ID <span class="text-gray-600 lowercase font-normal">(optional)</span></label>
                <div class="relative">
                    <span class="material-icons absolute left-4 top-3.5 text-gray-500 text-base">groups</span>
                    <input 
                        type="text" 
                        [(ngModel)]="activeTripId" 
                        name="activeTripId"
                        placeholder="trip_goa_2026"
                        class="w-full bg-[#121212] border border-green-950 rounded-xl py-3 pl-11 pr-4 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-950/30 transition-all font-medium"
                    />
                </div>
            </div>

            <button 
                (click)="onSignUp()" 
                [disabled]="isLoading"
                class="w-full bg-gradient-to-r from-emerald-600 to-green-700 hover:from-emerald-500 hover:to-green-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-950/40 border border-emerald-400/10 active:scale-[0.98] transform transition-all flex items-center justify-center gap-2 mt-2 disabled:opacity-50 disabled:cursor-not-allowed"
            >
                <span *ngIf="isLoading" class="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></span>
                <span class="tracking-wide">{{ isLoading ? 'Creating Account...' : 'Register Now' }}</span>
            </button>

        </div>

        <div class="text-center mt-5">
            <p class="text-xs text-gray-500 font-medium">
                Already have an account? 
                <a routerLink="/login" class="text-emerald-400 font-extrabold hover:text-emerald-300 hover:underline transition-colors ml-1 cursor-pointer">Login here</a>
            </p>
        </div>

    </div>
</div>
