<body class="bg-gradient-to-br from-[#121212] via-[#1F1F1F] to-[#121212] flex items-center justify-center min-h-screen p-4 antialiased text-gray-100 relative">
    
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_rgba(13,148,136,0.05),_transparent_60%)]"></div>

    <div class="bg-[#1A1A1A]/90 backdrop-blur-lg p-8 rounded-[2rem] shadow-[inset_0px_-3px_8px_rgba(255,255,255,0.02),0px_30px_90px_rgba(0,0,0,0.6)] border border-teal-900/40 w-full max-w-md transform transition-all duration-400 hover:shadow-[0_40px_100px_rgba(0,0,0,0.7)] relative overflow-hidden">
        
        <div class="absolute inset-0 rounded-[2rem] bg-[radial-gradient(circle_at_center,_rgba(255,255,255,0.01),_transparent_80%)]"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-[#141414] text-teal-600 rounded-2xl mb-4 shadow-[inset_1px_1px_3px_rgba(0,0,0,0.3),inset_-1px_-1px_2px_rgba(255,255,255,0.01)]">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>
            </div>
            <h2 class="text-3xl font-black tracking-tight text-gray-100">Welcome Back</h2>
            <p class="text-gray-500 text-sm mt-1.5 font-medium">Login to manage your bookings</p>
        </div>

        <form (ngSubmit)="onLogin()" class="space-y-5 relative z-10">
            <div>
                <label class="block text-[11px] font-extrabold text-[#22C55E] uppercase tracking-wider mb-2">Email Address</label>
                <div class="relative">
                    <input type="email" [(ngModel)]="email" name="email" required 
                        class="w-full pl-4 pr-4 py-3.5 rounded-xl border-none shadow-[inset_1px_1px_3px_rgba(0,0,0,0.4),inset_-1px_-1px_2px_rgba(255,255,255,0.01)] bg-[#141414] focus:ring-4 focus:ring-teal-900/20 outline-none transition-all text-gray-200 font-medium placeholder-gray-600"
                        placeholder="name@example.com">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-[11px] font-extrabold text-[#22C55E] uppercase tracking-wider">Password</label>
                    <a href="javascript:void(0)" class="text-xs font-semibold text-teal-600 hover:text-teal-700 transition">Forgot?</a>
                </div>
                <div class="relative">
                    <input type="password" [(ngModel)]="password" name="password" required 
                        class="w-full pl-4 pr-4 py-3.5 rounded-xl border-none shadow-[inset_1px_1px_3px_rgba(0,0,0,0.4),inset_-1px_-1px_2px_rgba(255,255,255,0.01)] bg-[#141414] focus:ring-4 focus:ring-teal-900/20 outline-none transition-all text-gray-200 font-medium placeholder-gray-600"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-[#1D1D1D] text-teal-400 font-bold py-4 rounded-xl shadow-[inset_0px_-3px_8px_rgba(255,255,255,0.01),0px_10px_25px_rgba(0,0,0,0.5)] border border-teal-900/40 hover:shadow-[0_15px_35px_rgba(0,0,0,0.6)] active:scale-[0.98] transform transition-all duration-200 text-center relative flex items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 opacity-70">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
                </svg>
                <span>Login to Account</span>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-teal-900/40 flex flex-col items-center justify-center gap-2 relative z-10">
            <p class="text-sm text-gray-600 font-medium">
                Don't have an account? 
                <a routerLink="/signup" class="text-teal-600 font-bold hover:text-teal-700 transition-colors ml-1 inline-block">Sign Up</a>
            </p>
        </div>
    </div>
</body>
