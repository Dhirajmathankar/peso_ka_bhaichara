
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
            <p class="text-gray-400 text-sm mt-2">Login to manage your bookings</p>
        </div>

        <form action="/home" method="GET" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none">
            </div>
            <button  class="w-full bg-teal-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-teal-700 transition">
                Login <a  routerLink="/home"  class="text-teal-600 font-bold">LO-UP</a>
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-500">
            Don't have an account?  <a  routerLink="/home"  class="text-teal-600 font-bold">LO-UP</a> <a  routerLink="/signup"  class="text-teal-600 font-bold">Sign Up</a>
        </p>
    </div>
</body>
