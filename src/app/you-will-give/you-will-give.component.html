<div class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-end justify-center" (click)="onCloseClick()">
 <div class="w-full max-w-md bg-[#0a2a20] rounded-t-[32px] border-t border-green-900/60 p-6 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] animate-slide-up" style="padding-bottom: 40px;" (click)="$event.stopPropagation()">
    
    <div class="w-12 h-1.5 bg-green-900/60 rounded-full mx-auto mb-6 cursor-pointer"></div>

    <div class="flex justify-between items-center mb-6">
      <div>
        <span class="text-xs text-red-400 font-bold uppercase tracking-wider">Debit Ledger</span>
        <h3 class="text-xl font-bold text-white flex items-center gap-2">
          You Will Give <span class="text-red-400">₹4,200</span>
        </h3>
      </div>
      <button (click)="onCloseClick()" class="w-8 h-8 bg-[#061a14] rounded-full flex items-center justify-center text-gray-400 hover:text-white active:scale-90 transition-all">
        <span class="material-icons text-sm">close</span>
      </button>
    </div>

    <div class="relative mb-4">
      <span class="material-icons absolute left-3 top-3 text-gray-500 text-sm">search</span>
      <input type="text" placeholder="Search Supplier / Shopkeeper..." class="w-full bg-[#061a14] border border-green-950 text-sm text-white pl-10 pr-4 py-2.5 rounded-xl focus:outline-none focus:border-red-500 transition-colors">
    </div>

    <div class="space-y-3 max-h-[350px] overflow-y-auto pr-1">
      
      <div class="flex items-center justify-between bg-[#061a14]/60 p-4 rounded-2xl border border-green-900/20">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-red-950/40 flex items-center justify-center border border-red-900/30">
            <span class="text-red-400 font-bold">KK</span>
          </div>
          <div>
            <h4 class="font-semibold text-sm text-gray-200">Kiran Kirana Store</h4>
            <p class="text-[10px] text-gray-500">Last payment: Jan 15</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="text-right">
            <p class="text-red-400 font-bold text-sm">- ₹3,000</p>
            <span class="text-[9px] bg-red-900/30 text-red-400 px-1.5 py-0.5 rounded">Pending</span>
          </div>
          <button class="w-9 h-9 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center justify-center text-red-400 hover:bg-red-500 active:scale-95 transition-all">
            <span class="material-icons text-lg">payment</span>
          </button>
        </div>
      </div>

      <div class="flex items-center justify-between bg-[#061a14]/60 p-4 rounded-2xl border border-green-900/20">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-red-950/40 flex items-center justify-center border border-red-900/30">
            <span class="text-red-400 font-bold">DK</span>
          </div>
          <div>
            <h4 class="font-semibold text-sm text-gray-200">Deepak Kumar (Wholesale)</h4>
            <p class="text-[10px] text-gray-500">Last entry: 1 week ago</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="text-right">
            <p class="text-red-400 font-bold text-sm">- ₹1,200</p>
            <span class="text-[9px] bg-orange-900/30 text-orange-400 px-1.5 py-0.5 rounded">Urgent</span>
          </div>
          <button class="w-9 h-9 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center justify-center text-red-400 hover:bg-red-500 active:scale-95 transition-all">
            <span class="material-icons text-lg">payment</span>
          </button>
        </div>
      </div>

    </div>

    <button class="w-full mt-5 bg-gradient-to-r from-red-600 to-rose-700 text-white font-semibold text-sm py-3.5 rounded-xl active:scale-[0.98] transition-all shadow-[0_4px_15px_rgba(239,68,68,0.3)] flex items-center justify-center gap-2">
      <span class="material-icons text-sm">person_add</span> Add New Supplier
    </button>

  </div>
</div>
